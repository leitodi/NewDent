services:
  - type: web
    runtime: node
    name: newdent-api
    rootDir: backend
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://newdent.onrender.com,http://localhost:5173

  - type: web
    runtime: static
    name: newdent
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://newdent-api.onrender.com/api
